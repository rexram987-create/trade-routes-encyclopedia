                wuDesc1: "Born 'Farid Khan' in Sasaram, Bihar (India), the son of a modest Afghan jagirdar (landlord). Family disputes forced him from home to seek education and military experience. He earned the title 'Sher Khan' (Tiger Lord) after killing a tiger barehanded to protect the King of Bihar. With exceptional political and military skill, he defeated the Mughal Empire (Emperor Humayun) and founded the Suri Dynasty. Though he ruled only 5 years before dying in an artillery accident, his civic reforms influenced India for centuries.",

                wuReason2Title: "Creating a Postal and Intelligence System (Dak Chauki):",

                animalsTitle: "Animal Logistics: Porters of the Subcontinent",
                animalsDesc: "Trade on the Grand Trunk Road, crossing jungles, wide rivers, and vast plains, relied on animals adapted to the Indian climate.",
                horseSpecies: "Zebu Cattle (Bos primigenius indicus):",
                horseDesc: "A breed of cattle characterized by a fatty hump on their shoulders and a large dewlap. They were the primary pullers of Bullock carts along the road. <strong class='text-white mt-2 block'>Strategic Importance:</strong> The Zebu excels in extreme heat tolerance and resistance to tropical diseases of the Ganges valley, enabling continuous transport of agricultural goods (wheat and rice) at a steady pace. <strong class='text-white mt-2 block'>Origin:</strong> Indian Subcontinent.",

                elephantDesc: "A subspecies of the Asian elephant native to India. <strong class='text-white mt-2 block'>Historical and Strategic Importance:</strong> Elephants were used for royal processions and mobility of high-ranking officers (carrying a luxurious howdah). Militarily and economically, they were the 'tractors' of the ancient world: aiding in crossing raging unbridged rivers, clearing dense forest sections, and carrying heavy artillery and loads in the military campaigns of Sher Shah and the Mughals. <strong class='text-white mt-2 block'>Origin:</strong> India and Bengal.",

                caravanPlaceholder: "",

                strategyTitle: "Trade, Strategy, and Geopolitics",
                economyTitle: "Importance of Trade and Economy",
                economyDesc: "The road was the main artery connecting the manufacturing cities of inland India with export ports in the Bay of Bengal and mainland Asia via Afghanistan. It allowed smooth flow of goods, lowered transport costs, and generated immense wealth for cities along it, like Lahore, Delhi, Agra, Varanasi, and Kolkata.",

                    <section class="glass-card p-8 rounded-3xl bg-red-900/10 border-red-900/30 text-center">
                        <h3 class="text-2xl font-bold text-red-400 mb-4">${t.declineTitle}</h3>
                        <p class="text-slate-300 leading-relaxed max-w-3xl mx-auto">${t.declineDesc}</p>
                    </section>
                </main>

                <footer class="mt-auto border-t border-slate-800 bg-slate-900/90 py-6 text-center z-10">
                    <p class="text-slate-500 text-sm font-semibold tracking-wide">${t.footer}</p>
                </footer>
            `;
            
            document.getElementById('app-container').innerHTML = html;
        }

        window.onload = renderPage;
    </script>
</body>
</html>

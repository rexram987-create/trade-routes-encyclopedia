    <style>
        /* הגדרות גופן ועיצוב המותאמות לתצוגה חלקה במסכי פרימיום (Samsung S25 Ultra) */
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Heebo', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* עיצוב כרטיסיות עם אפקט זכוכית (Glassmorphism) למצב כהה */
        .glass-card {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(75, 85, 99, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: rgba(96, 165, 250, 0.5);
        }

        /* התאמת פס הגלילה למצב כהה */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4B5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6B7280; 
        }

        /* אנימציות מעבר רכות */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                        <div class="bg-gray-800/80 p-5 rounded-xl border border-gray-700 shadow-inner">
                            <ul class="space-y-3">
                                <li class="flex flex-col sm:flex-row gap-2">
                                    <span class="bg-blue-900/50 text-blue-300 px-3 py-1 rounded-md font-bold text-sm whitespace-nowrap border border-blue-800/50">חלק א' – Cha (תה) + Ma (סוס)</span>
                                    <span>צמד מילים המתאר את אופיו המדויק של הסחר. הטיבטים היו זקוקים לתה כדי לקבל ויטמינים באזור בו חקלאות רגילה לא מתאפשרת, והסינים שילמו בלבני תה דחוסות תמורת כוח סוס צבאי.</span>
                                </li>
                                <li class="flex flex-col sm:flex-row gap-2">
                                    <span class="bg-emerald-900/50 text-emerald-300 px-3 py-1 rounded-md font-bold text-sm whitespace-nowrap border border-emerald-800/50">חלק ב' – Dao (דרך)</span>
                                    <span>מונח שפירושו שביל או דרך. המסלול עבר דרך ההרים והעמקים המסוכנים ביותר בעולם (מחוזות סצ'ואן ויונאן ועד להרי ההימלאיה של טיבט).</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                `,
                origins: 'החלה עקב הקושי העצום של הצבא הסיני לגדל סוסי קרב איכותיים באדמות החקלאיות במרכז סין. סבלים אנושיים נשאו על גבם משקלי ענק של לבני תה (לעיתים מעל 70 ק"ג לאדם) בטיפוס לגבהים של למעלה מ-4,000 מטרים לחילופין.',
                ideology: 'תלות הדדית וקשר של הישרדות. המיזוג בין תרבות ההאן הסינית למסורות הבודהיזם הטיבטי. סחר החליפין כפה שלום אסטרטגי לפרקים ארוכים בין שתי מעצמות אסייתיות שונות לחלוטין באופיין.',
                achievements: 'יצירת רשת סחר בגבהים שאין לה אח ורע בעולם, ששרדה אלפי שנים למרות תנאי אקלים וטופוגרפיה אכזריים. קיבעה את התה כמשקה הפופולרי ביותר במזרח אסיה (וטיבט בפרט) ושילבה עמוקות את כלכלות סין וטיבט.'
            }
        ];

        // פונקציות לתצוגה הדינמית
        
        /**
         * מציג את דף הבית המרכזי - רשת של 10 הנתיבים מסודרת כרונולוגית
         */
        function renderHome() {
            const container = document.getElementById('app-container');
            const t = uiTexts[currentLang];
            const isEn = currentLang === 'en';
            
            let html = `
                <!-- סרגל ניווט עליון -->
                <nav class="flex justify-between items-center mb-10 fade-in">
                    <button onclick="toggleLanguage()" class="flex items-center gap-2 text-sm font-semibold text-gray-300 hover:text-white bg-gray-800/60 hover:bg-gray-700/60 px-4 py-2 rounded-xl border border-gray-700 transition-all shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                        ${t.langBtn}
                    </button>
                    <a href="./about/index.html" class="flex items-center gap-2 text-sm font-semibold text-blue-400 hover:text-blue-300 bg-blue-900/30 hover:bg-blue-800/40 px-5 py-2 rounded-xl border border-blue-800/50 transition-all shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        ${t.aboutBtn}
                    </a>
                </nav>

                <div class="text-center mb-16 fade-in">
                    <span class="inline-block py-1 px-4 rounded-full bg-blue-900/50 text-blue-400 border border-blue-700 font-semibold mb-4 text-sm tracking-widest">${t.timeline}</span>
                    <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 tracking-tight mb-6">
                        ${t.title}
                    </h1>
                    
                    <!-- אזור המבוא -->
                    <div class="max-w-4xl mx-auto bg-gray-800/40 p-6 sm:p-8 rounded-3xl border border-gray-700/50 mb-10 shadow-inner ${isEn ? 'text-left' : 'text-right'} relative overflow-hidden">
                        <div class="absolute ${isEn ? 'left-0' : 'right-0'} top-0 w-1 h-full bg-blue-500"></div>
                        <h3 class="text-2xl font-bold text-white mb-4 flex items-center gap-3">
                            <span class="text-2xl">📚</span> ${t.introTitle}
                        </h3>
                        <p class="text-base sm:text-lg text-gray-300 leading-relaxed">
                            ${t.introText}
                        </p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 sm:gap-8">
            `;

            tradeRoutes.forEach((route, index) => {
                const rName = isEn ? routeTranslations[route.id].name : route.name;
                const rYear = isEn ? routeTranslations[route.id].year : route.creationYear.split('(')[0];
                const rDesc = isEn ? routeTranslations[route.id].desc : route.achievements;
                const linkPath = isEn ? `./en/${route.id}/index.html` : `./${route.id}/index.html`;

                html += `
                    <!-- הכרטיסיה הומרה לתגית A שמובילה לתיקייה נפרדת בגיטהאב -->
                    <a href="${linkPath}" class="glass-card rounded-3xl p-6 cursor-pointer flex flex-col items-center text-center group fade-in hover:bg-gray-800/80 relative block no-underline transition-transform">
                        <div class="absolute -top-4 -left-4 w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold shadow-lg border-2 border-gray-900 z-10">
                            ${index + 1}
                        </div>
                        <div class="text-6xl mb-5 group-hover:scale-110 group-hover:-translate-y-2 transition-all duration-300 drop-shadow-xl mt-2">${route.icon}</div>
                        <h2 class="text-2xl font-bold text-white mb-2">${rName}</h2>
                        <div class="bg-gray-800/80 px-3 py-1.5 rounded-lg border border-gray-700 w-full mb-3">
                            <p class="text-xs text-blue-300 font-semibold text-center w-full" dir="${isEn ? 'ltr' : 'rtl'}">${rYear}</p>
                        </div>
                        <p class="text-gray-400 text-sm leading-relaxed line-clamp-3 mb-5">${rDesc}</p>
                        <div class="mt-auto w-full">
                            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 group-hover:from-blue-500 group-hover:to-indigo-500 text-white font-bold py-2.5 px-4 rounded-xl transition-all shadow-md w-full flex items-center justify-center gap-2 text-sm">
                                <span>${t.readMore}</span>
                                <svg class="w-4 h-4 transform ${isEn ? '' : 'rotate-180'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </a>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /**
         * מציג דף מידע מפורט עבור נתיב ספציפי (מבוסס על ה-ID שלו).
         */
        function renderRoute(routeId) {
            const route = tradeRoutes.find(r => r.id === routeId);
            if (!route) return;

            const container = document.getElementById('app-container');
            
            const html = `
                <div class="fade-in max-w-5xl mx-auto">
                    <!-- כפתור חזרה לדף הבית -->
                    <button onclick="renderHome()" class="mb-8 flex items-center text-gray-400 hover:text-white bg-gray-800/50 hover:bg-gray-700/50 border border-gray-700 px-5 py-2.5 rounded-xl transition-all group w-fit">
                        <svg class="w-5 h-5 ml-2 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                        <span class="font-semibold">חזור למפת הנתיבים</span>
                    </button>

                    <!-- כותרת ראשית של הנתיב (Header) -->
                    <div class="glass-card rounded-[2rem] p-8 sm:p-12 mb-10 text-center sm:text-right flex flex-col sm:flex-row items-center sm:items-start gap-8 relative overflow-hidden border-t-4 border-t-blue-500">
                        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500 opacity-5 rounded-full blur-3xl -mr-32 -mt-32"></div>
                        <div class="text-8xl sm:text-9xl drop-shadow-2xl z-10">${route.icon}</div>
                        <div class="flex-1 z-10">
                            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold text-white mb-6">${route.name}</h1>
                            <div class="flex flex-wrap gap-4 justify-center sm:justify-start">
                                <span class="bg-indigo-900/50 text-indigo-300 px-5 py-2 rounded-xl text-sm font-semibold border border-indigo-800/50 flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    פעילות: ${route.activeYears}
                                </span>
                                <span class="bg-emerald-900/50 text-emerald-300 px-5 py-2 rounded-xl text-sm font-semibold border border-emerald-800/50 flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    שנת ייסוד: ${route.creationYear}
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- אזור התוכן המחקרי - חלוקה לעמודות (Grid) -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 sm:gap-10">
                        
                        <!-- עמודה ימנית (יוזמים ושורשים) -->
                        <div class="space-y-8 sm:space-y-10">
                            <!-- יזמים וסיבה -->
                            <section class="glass-card p-6 sm:p-8 rounded-3xl relative overflow-hidden">
                                <div class="absolute left-0 top-0 w-1 h-full bg-blue-500"></div>
                                <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                    <span class="text-3xl">🏛️</span> בוני ומייסדי הנתיב
                                </h3>
                                <div class="space-y-5">
                                    <div class="bg-gray-800/50 p-4 rounded-xl border border-gray-700/50">
                                        <strong class="text-blue-400 block mb-1 text-sm uppercase tracking-wider">יוזם / ממציא ראשי:</strong> 
                                        <p class="text-gray-200 text-lg">${route.initiator}</p>
                                    </div>
                                    <div class="bg-gray-800/50 p-4 rounded-xl border border-gray-700/50">
                                        <strong class="text-blue-400 block mb-1 text-sm uppercase tracking-wider">הסיבה ההיסטורית להקמה:</strong> 
                                        <p class="text-gray-300 leading-relaxed">${route.creationReason}</p>
                                    </div>
                                </div>
                            </section>

                            <!-- רקע וילדות (שורשים) -->
                            <section class="glass-card p-6 sm:p-8 rounded-3xl relative overflow-hidden">
                                <div class="absolute left-0 top-0 w-1 h-full bg-green-500"></div>
                                <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                    <span class="text-3xl">🌱</span> שורשים ותחילת הדרך
                                </h3>
                                <p class="text-gray-300 leading-relaxed text-lg">${route.origins}</p>
                            </section>
                        </div>

                        <!-- עמודה שמאלית (אטימולוגיה) -->
                        <div class="space-y-8 sm:space-y-10 lg:h-full">
                            <section class="glass-card p-6 sm:p-8 rounded-3xl h-full relative overflow-hidden">
                                <div class="absolute left-0 top-0 w-1 h-full bg-indigo-500"></div>
                                <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                    <span class="text-3xl">📖</span> ניתוח אטימולוגי מלא
                                </h3>
                                <div class="text-lg">
                                    ${route.etymology}
                                </div>
                            </section>
                        </div>

                        <!-- אזור רוחב מלא (אידאולוגיה והישגים) -->
                        <div class="col-span-1 lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8 sm:gap-10 mt-2">
                            <!-- אידאולוגיה -->
                            <section class="glass-card p-6 sm:p-8 rounded-3xl relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-purple-500"></div>
                                <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                    <span class="text-3xl">💡</span> אידאולוגיה ומשמעות
                                </h3>
                                <p class="text-gray-300 leading-relaxed text-lg">${route.ideology}</p>
                            </section>

                            <!-- הישגים -->
                            <section class="glass-card p-6 sm:p-8 rounded-3xl relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-yellow-500"></div>
                                <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                    <span class="text-3xl">🏆</span> הישגים היסטוריים
                                </h3>
                                <p class="text-gray-300 leading-relaxed text-lg">${route.achievements}</p>
                            </section>
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // אתחול האפליקציה וטעינת המסך הראשי
        window.onload = renderHome;
    </script>
</body>
</html>

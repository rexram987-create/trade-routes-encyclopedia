                            <svg class="w-10 h-10 mx-auto text-amber-400 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <p>${t.caravanPlaceholder}</p>
                        </div>
                    </div>

                    <!-- אסטרטגיה וסחורות -->
                    <section class="glass-card rounded-3xl p-8 sm:p-10 relative overflow-hidden">
                        <div class="absolute ${isEn ? 'left-0' : 'right-0'} top-0 w-1.5 h-full bg-yellow-500"></div>
                        <h2 class="text-3xl font-bold text-white mb-6 flex items-center gap-3">
                            <span class="text-3xl">⚖️</span> ${t.strategyTitle}
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div class="bg-gray-800/40 p-6 rounded-2xl border border-gray-700/50">
                                <h3 class="text-xl font-bold text-yellow-400 mb-3">${t.economyTitle}</h3>
                                <p class="text-gray-300 leading-relaxed text-sm sm:text-base">${t.economyDesc}</p>
                            </div>
                            <div class="bg-gray-800/40 p-6 rounded-2xl border border-gray-700/50">
                                <h3 class="text-xl font-bold text-red-400 mb-3">${t.milStrategyTitle}</h3>
                                <p class="text-gray-300 leading-relaxed text-sm sm:text-base">${t.milStrategyDesc}</p>
                            </div>
                        </div>
                        <div class="bg-gray-800/60 p-6 rounded-2xl border border-gray-700 mt-4">
                            <h3 class="text-xl font-bold text-emerald-400 mb-4 border-b border-gray-700 pb-2">${t.goodsOriginTitle}</h3>
                            <ul class="space-y-4">
                                <li class="flex items-start gap-4"><span class="text-2xl mt-1">🇨🇳</span><p class="text-gray-300 text-sm sm:text-base"><strong class="text-white text-lg block mb-1">${t.chinaOrigin}</strong> ${t.chinaGoods}</p></li>
                                <li class="flex items-start gap-4"><span class="text-2xl mt-1">🇮🇳</span><p class="text-gray-300 text-sm sm:text-base"><strong class="text-white text-lg block mb-1">${t.indiaOrigin}</strong> ${t.indiaGoods}</p></li>
                                <li class="flex items-start gap-4"><span class="text-2xl mt-1">🐎</span><p class="text-gray-300 text-sm sm:text-base"><strong class="text-white text-lg block mb-1">${t.persiaOrigin}</strong> ${t.persiaGoods}</p></li>
                                <li class="flex items-start gap-4"><span class="text-2xl mt-1">🏛️</span><p class="text-gray-300 text-sm sm:text-base"><strong class="text-white text-lg block mb-1">${t.romeOrigin}</strong> ${t.romeGoods}</p></li>
                            </ul>
                        </div>
                    </section>

                    <!-- אידאולוגיה וטכנולוגיה -->
                    <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="glass-card p-8 rounded-3xl border-t-4 border-t-purple-500">
                            <h3 class="text-2xl font-bold text-white mb-4 flex items-center gap-2"><span class="text-2xl">💡</span> ${t.ideologyTitle}</h3>
                            <p class="text-gray-300 leading-relaxed">${t.ideologyDesc}</p>
                        </div>
                        <div class="glass-card p-8 rounded-3xl border-t-4 border-t-emerald-500">
                            <h3 class="text-2xl font-bold text-white mb-4 flex items-center gap-2"><span class="text-2xl">⚙️</span> ${t.techTitle}</h3>
                            <p class="text-gray-300 leading-relaxed">${t.techDesc}</p>
                            <ul class="list-disc list-inside mt-4 text-gray-300 space-y-2 font-semibold">
                                <li class="text-emerald-300">${t.tech1}</li>
                                <li class="text-emerald-300">${t.tech2}</li>
                                <li class="text-emerald-300">${t.tech3}</li>
                                <li class="text-emerald-300">${t.tech4}</li>
                            </ul>
                            <p class="text-gray-400 text-sm mt-4">${t.techSummary}</p>
                        </div>
                    </section>
                    
                    <!-- סיכום -->
                    <section class="glass-card p-8 rounded-3xl bg-red-900/10 border-red-900/30 text-center">
                        <h3 class="text-2xl font-bold text-red-400 mb-4">${t.declineTitle}</h3>
                        <p class="text-gray-300 leading-relaxed max-w-3xl mx-auto">${t.declineDesc}</p>
                    </section>
                </main>

                <!-- פוטר -->
                <footer class="mt-auto border-t border-gray-800 bg-gray-900/90 py-6 text-center z-10">
                    <p class="text-gray-500 text-sm font-semibold tracking-wide">${t.footer}</p>
                </footer>
            `;
            
            document.getElementById('app-container').innerHTML = html;
        }

        // טעינה ראשונית
        window.onload = renderPage;
    </script>
</body>
</html>
